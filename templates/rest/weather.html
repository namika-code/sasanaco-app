{% extends 'base.html' %}

{% block content %}

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

    <div class="weather-page">

        <h1 class="weather-title">
            <i class="bi bi-cloud-sun-fill"></i>
            天気
        </h1>

        <div class="weather-card">

            <div class="city-name">
                松本市
            </div>

            <div class="weather-main">

                <div class="weather-icon-area">
                    <i class="{{ today_icon }} weather-icon"></i>
                </div>

                <div class="temp-area">
                    <div class="current-temp">
                        {{ weather.current.temperature_2m }}℃
                    </div>

                    <div class="weather-label">
                        現在の気温
                    </div>
                </div>

            </div>

            <div class="temp-detail">

                <div class="temp-item high">
                    <div class="temp-text">
                        最高気温
                    </div>

                    <div class="temp-value">
                        {{ weather.daily.temperature_2m_max[0] }}℃
                    </div>
                </div>

                <div class="temp-item low">
                    <div class="temp-text">
                        最低気温
                    </div>

                    <div class="temp-value">
                        {{ weather.daily.temperature_2m_min[0] }}℃
                    </div>
                </div>

            </div>

        </div>
    <div class="mt-4">
        <a href="{{ url_for('rest.index') }}" class="btn btn-secondary">
            休憩へ
        </a>
    </div>
</div>

<style>
.weather-page {
    display: flex;
    flex-direction: column;
    align-items: center;
}

.weather-title {
    margin-bottom: 30px;
    font-weight: bold;
    color: #333;
}

.weather-title i {
    color: #ffb300;
    margin-right: 10px;
}

.weather-card {
    width: 100%;
    max-width: 420px;
    background: linear-gradient(
        135deg,
        #4facfe,
        #00f2fe
    );

    border-radius: 25px;
    padding: 30px;
    color: white;
    box-shadow:
        0 10px 25px rgba(0,0,0,0.2);
    text-align: center;
}

.city-name {
    font-size: 28px;
    font-weight: bold;
    margin-bottom: 20px;
}

.weather-main {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 30px;
    margin-bottom: 30px;
}

.weather-icon {
    font-size: 80px;
    color: #fff176;
}

.current-temp {
    font-size: 52px;
    font-weight: bold;
    line-height: 1;
}

.weather-label {
    margin-top: 8px;
    font-size: 14px;
    opacity: 0.9;
}

.temp-detail {
    display: flex;
    gap: 15px;
}

.temp-item {
    flex: 1;
    background: rgba(255,255,255,0.2);
    border-radius: 15px;
    padding: 15px;
}

.temp-text {
    font-size: 14px;
    margin-bottom: 8px;
    opacity: 0.9;
}

.temp-value {
    font-size: 24px;
    font-weight: bold;
}

.high .temp-value {
    color: #ffeb3b;
}

.low .temp-value {
    color: #e3f2fd;
}
</style>

{% endblock %}
