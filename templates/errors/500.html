{% extends 'base.html' %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    
    <!-- 404と同じ統一されたカードデザイン -->
    <div class="card shadow-sm border-0 text-center p-5" style="border-radius: 16px; max-width: 500px; width: 90%;">
        
        <div class="display-1 text-danger mb-4 opacity-50">
            <i class="bi bi-exclamation-triangle"></i>
        </div>
        
        <h3 class="fw-bold text-dark mb-3">システムエラーが発生しました</h3>
        
        <p class="text-secondary mb-4">
            現在、サーバーで予期せぬ問題が発生しています。<br>
            大変ご迷惑をおかけしますが、しばらく待ってから<br>
            再度アクセスをお願いいたします。
        </p>
        
        <div class="d-grid gap-2">
            <a href="{{ url_for('top.index') }}" class="btn btn-primary btn-lg shadow-sm" style="border-radius: 8px;">
                <i class="bi bi-house-door me-2"></i>トップページへ戻る
            </a>
            <!-- エラー時はブラウザバックよりもトップへ誘導するのが親切です -->
        </div>
        
        <div class="mt-4 pt-3 border-top">
            <p class="text-muted small mb-0">
                改善されない場合はシステム管理者までご連絡ください。
            </p>
        </div>
        
    </div>
</div>
{% endblock %}
