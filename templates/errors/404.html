{% extends 'base.html' %}

{% block content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 70vh;">
    
    <!-- 一覧画面やプロフィールと統一したカードデザイン -->
    <div class="card shadow-sm border-0 text-center p-5" style="border-radius: 16px; max-width: 500px; width: 90%;">
        
        <div class="display-1 text-secondary mb-4 opacity-50">
            <i class="bi bi-file-earmark-break"></i>
        </div>
        
        <h3 class="fw-bold text-dark mb-3">ページが見つかりません</h3>
        
        <p class="text-secondary mb-4">
            申し訳ありませんが、お探しのページは移動したか、<br>
            削除された可能性があります。
        </p>
        
        <div class="d-grid gap-2">
            <a href="{{ url_for('top.index') }}" class="btn btn-primary btn-lg shadow-sm" style="border-radius: 8px;">
                <i class="bi bi-house-door me-2"></i>トップページへ戻る
            </a>
            <a href="javascript:history.back()" class="btn btn-outline-secondary mt-2" style="border-radius: 8px;">
                前のページに戻る
            </a>
        </div>
        
    </div>
</div>
{% endblock %}
